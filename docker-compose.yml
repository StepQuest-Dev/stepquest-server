version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stepquest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stepquest
      POSTGRES_PASSWORD: stepquest_dev_password
      POSTGRES_DB: stepquest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stepquest -d stepquest']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stepquest_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stepquest_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    command: npx ts-node src/main.ts
    environment:
      DATABASE_URL: "postgresql://stepquest:stepquest_dev_password@postgres:5432/stepquest?schema=public"
      JWT_SECRET: "moje_super_tajne_haslo_stepquest_123!"
      JWT_EXPIRES_IN: "7d"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: